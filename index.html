<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Matcher | AI Playlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mainContainer" class="glass-container">
        
        <div id="authPage">
            <h1 id="authTitle">VIBE<span>MATCHER</span></h1>
            <p id="loginError" class="error-msg" style="display:none;"></p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Agent Username" required>
                <input type="password" id="password" placeholder="Access Key" required>
            </div>

            <button id="loginBtn" onclick="handleLogin()">INITIALIZE LOGIN</button>
            <button id="signupBtn" onclick="handleSignup()" style="display:none;">CONFIRM REGISTRATION</button>

            <p id="toggleText">New User? <a href="#" onclick="toggleAuth(true)">Create Profile</a></p>
        </div>

        <div id="mainApp" style="display:none;">
            <div class="app-header">
                <h2>CORE<span>SYSTEM</span></h2>
                <button class="logout-btn" onclick="logout()">LOGOUT</button>
            </div>

            <div class="controls">
                <select id="langSelect">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Kannada">Kannada</option>
                    <option value="Telugu">Telugu</option>
                </select>

                <select id="eraSelect">
                    <option value="20s">2020s (Modern)</option>
                    <option value="90s">90s (Retro)</option>
                </select>
            </div>

            <div id="modeSelection">
                <button class="mode-btn" onclick="showAIScreen()">AI VIBE SCANNER</button>
                <button class="mode-btn" onclick="showManualScreen()">MANUAL SELECTION</button>
            </div>

            <div id="aiSection" style="display:none;">
                <label for="imageInput" class="upload-label">UPLOAD IMAGE FOR SCAN</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div id="manualSection" style="display:none;">
                <h3>Choose your Vibe:</h3>
                <div class="mood-grid">
                    <button onclick="getManualSong('Chill')">Chill</button>
                    <button onclick="getManualSong('Romantic')">Romantic</button>
                    <button onclick="getManualSong('Melody')">Melody</button>
                    <button onclick="getManualSong('Broken')">Broken</button>
                </div>
            </div>

            <div id="scanLine" style="display:none;">
                <div class="scanner"></div>
                <img id="imagePreview" src="" alt="Preview">
                <p>ANALYZING VIBE PIXELS...</p>
            </div>

            <div id="result-box" style="display:none;">
                <h3 id="aiFeedback">MATCH FOUND:</h3>
                <h1 id="song-display">---</h1>
                <a id="search-link" target="_blank" class="play-btn">PLAY ON YOUTUBE</a>
                <button class="retry-btn" onclick="location.reload()">NEW SCAN</button>
            </div>
        </div>
    </div>

    <script src="file.js"></script>
</body>
</html>
